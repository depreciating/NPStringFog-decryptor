name: NP-Deobfuscator-Cloud

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Deobfuscator
        run: python decrypt.py classes.dex

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Decrypted-DEX
          path: classes_decrypted.dex
          if-no-files-found: error